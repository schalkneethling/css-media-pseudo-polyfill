name: Bug Report
description: Report a bug with the polyfill
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Create a page with a `<video>` element and the following CSS: ...
        2. Load the polyfill via ...
        3. Play the video
        4. The `:playing` styles are not applied
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g., Chrome 125, Safari 18.1, Firefox 128
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Polyfill version
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or code samples.
